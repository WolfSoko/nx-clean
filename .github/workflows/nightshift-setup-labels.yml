name: Create Nightshift Labels
on:
  push:
    branches: [main]
    paths: ['.github/workflows/nightshift-setup-labels.yml']

permissions:
  issues: write

jobs:
  create-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'nightshift',            color: '0e1116', description: 'Nightshift automation' },
              { name: 'nightshift:todo',        color: 'e4e669', description: 'Nightshift: identified, not started' },
              { name: 'nightshift:in-progress', color: '0075ca', description: 'Nightshift: actively being worked' },
              { name: 'nightshift:blocked',     color: 'd93f0b', description: 'Nightshift: waiting for human input' },
              { name: 'nightshift:in-review',   color: '0e8a16', description: 'Nightshift: PR open, awaiting review' },
              { name: 'nightshift:done',        color: '6f42c1', description: 'Nightshift: merged/done' },
              { name: 'nightshift:wontfix',     color: 'ffffff', description: 'Nightshift: will not fix' },
              { name: 'nightwatch',             color: '1d76db', description: 'Nightwatch monitoring' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label.name, color: label.color, description: label.description });
                console.log(`Created: ${label.name}`);
              } catch (e) {
                if (e.status === 422) {
                  await github.rest.issues.updateLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label.name, color: label.color, description: label.description });
                  console.log(`Updated: ${label.name}`);
                } else { throw e; }
              }
            }
